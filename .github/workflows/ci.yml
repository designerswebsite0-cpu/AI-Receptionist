name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (lint, migrate, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        # pgvector/pgvector:pg16 is postgres:16 plus the pgvector extension
        # pre-compiled — plain postgres:16 doesn't have it, and Phase 3's
        # knowledge_chunks.embedding column (migration 0013) requires it.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_receptionist_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_receptionist_test
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/ai_receptionist_test
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest -v

  dashboard:
    name: Dashboard (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  website:
    name: Website (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/website
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WEBCHAT_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint

      # Next.js 16 runs its own TypeScript check as part of `next build` —
      # unlike apps/dashboard, there is no separate `typecheck` script.
      - name: Build
        run: npm run build
